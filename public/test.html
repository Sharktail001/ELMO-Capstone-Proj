<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Cognito Authentication - DEMO WEBPAGE ONLY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }

        pre {
            background: #eee;
            padding: 10px;
            text-align: left;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 14px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn {
            background: #007bff;
            color: white;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
        }

        a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Amazon Cognito User Pool Demo</h1>

        <% if (isAuthenticated) { %>
            <div>
                <h2>Welcome, <%= userInfo.username || userInfo.email %> 👋</h2>
                <p>Here are your user attributes:</p>
                <pre><%= JSON.stringify(userInfo, null, 4) %></pre>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        <% } else { %>
            <p>Please log in to continue</p>
            <a href="/login" class="login-btn">Login</a>
        <% } %>
    </div>
</body>
</html>
